name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        # Les tests DockerSandbox se skippent d'eux-mêmes quand le démon
        # n'est pas joignable (Windows) et tournent sur ubuntu.
        run: pytest tests --timeout 300 -q
