name: pages

# Publie le constructeur visuel (fichier autonome, zéro backend) sur
# GitHub Pages : https://laazizi.github.io/autoagent/
on:
  push:
    branches: [main]
    paths:
      - constructeur_autoagent.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prépare le site (le constructeur devient la page d'accueil)
        run: |
          mkdir site
          cp constructeur_autoagent.html site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
