const SHOWCASES = [
  {id: "09", file: "09_sortie_structuree.py", label: "09 · Sortie structurée (code seul)", note: "JSON fiable sans agent : response_format demandé au provider, parse direct.", code: "\"\"\"08 — Sortie structurée : du JSON fiable, pas du texte à re-parser.\n\n`response_format={\"type\": \"json_object\"}` active le JSON mode natif\n(OpenAI/DeepSeek/Gemini ; consigne stricte pour Anthropic). On appelle le\nprovider DIRECTEMENT (sans boucle d'agent) pour extraire une fiche\nstructurée d'un texte libre — le pattern « extraction » classique.\n\n    python examples_autoagent/08_sortie_structuree.py\n\"\"\"\n\nimport json\n\nfrom _common import make_provider\n\nfrom autoagent import LLMRequest, Message\n\nTEXTE = (\n    \"Bonjour, ici l'exploitant A7. Le capteur CMP-VAL-SN à Valence (GPS 44.95, 4.87) \"\n    \"ne remonte plus rien depuis 8h ce matin, sens sud. Il faisait très chaud hier. \"\n    \"Merci de regarder en priorité haute.\"\n)\n\n\ndef main() -> None:\n    provider = make_provider()\n\n    request = LLMRequest(\n        messages=[\n            Message(role=\"system\", content=(\n                \"Extrais une fiche d'incident. Réponds en JSON avec EXACTEMENT ces clés : \"\n                \"capteur_id (str), lieu (str), gps (objet lat/lon), heure (str), \"\n                \"direction (str), priorite (str parmi basse/normale/haute).\")),\n            Message(role=\"user\", content=TEXTE),\n        ],\n        response_format={\"type\": \"json_object\"},\n        temperature=0,\n        max_tokens=400,\n    )\n    response = provider.complete(request)\n\n    fiche = json.loads(response.content)  # parse direct : le JSON mode garantit la forme\n    print(\"Fiche extraite (dict Python) :\\n\")\n    print(json.dumps(fiche, indent=2, ensure_ascii=False))\n    print(f\"\\ncapteur = {fiche.get('capteur_id')} | priorité = {fiche.get('priorite')}\")\n\n\nif __name__ == \"__main__\":\n    main()\n"},
  {id: "12", file: "12_pseudonymisation_pii.py", label: "12 · Pseudonymisation PII (code seul)", note: "RGPD : le host masque noms/emails/téléphones en jetons — le LLM ne voit jamais les vraies données.", code: "\"\"\"12 — Pseudonymisation : le LLM ne voit JAMAIS les vraies données (RGPD).\n\nPattern « coffre-fort à la frontière ». Avant qu'un texte n'atteigne le LLM,\nle HOST remplace les données personnelles (nom, e-mail, téléphone) par des\nJETONS opaques ([PERSONNE_1], [EMAIL_1]…) et garde la correspondance CÔTÉ\nHOST. Le modèle raisonne sur les jetons ; sa sortie est « dé-tokenisée »\nlocalement — les vraies valeurs réapparaissent uniquement dans le résultat\nfinal, sans avoir transité par le fournisseur LLM.\n\nLe script PROUVE qu'aucune vraie donnée n'est dans le payload envoyé au LLM.\n\n    python examples_autoagent/12_pseudonymisation_pii.py\n\"\"\"\n\nimport re\n\nfrom _common import make_provider\n\nfrom autoagent import LLMRequest, Message\n\n# --- Dossier client RÉEL (fictif, mais c'est le genre de données à protéger) -\nDOSSIER = {\n    \"nom\": \"Camille Berthier\",\n    \"email\": \"camille.berthier@example.com\",\n    \"tel\": \"06 12 34 56 78\",\n}\nDEMANDE = (\n    f\"Rédige un SMS de relance court et poli pour {DOSSIER['nom']} : son rendez-vous \"\n    f\"d'installation du capteur est demain 9h. Termine par « répondez à {DOSSIER['email']} \"\n    f\"ou au {DOSSIER['tel']} ». Garde les mentions entre crochets EXACTEMENT telles quelles.\"\n)\n\n_EMAIL = re.compile(r\"[\\w.+-]+@[\\w-]+\\.[\\w.-]+\")\n_TEL = re.compile(r\"0[1-9](?:[ .\\-]?\\d{2}){4}\")\n\n\nclass Vault:\n    \"\"\"Remplace les PII par des jetons ; seul le HOST connaît la correspondance.\"\"\"\n\n    def __init__(self) -> None:\n        self._to_real: dict[str, str] = {}\n        self._to_token: dict[str, str] = {}\n        self._n: dict[str, int] = {}\n\n    def _tok(self, kind: str, real: str) -> str:\n        if real not in self._to_token:\n            self._n[kind] = self._n.get(kind, 0) + 1\n            token = f\"[{kind}_{self._n[kind]}]\"\n            self._to_token[real] = token\n            self._to_real[token] = real\n        return self._to_token[real]\n\n    def mask(self, text: str, noms: tuple[str, ...] = ()) -> str:\n        for nom in noms:  # noms connus d'abord (regex ne les attrape pas)\n            text = text.replace(nom, self._tok(\"PERSONNE\", nom))\n        text = _EMAIL.sub(lambda m: self._tok(\"EMAIL\", m.group()), text)\n        text = _TEL.sub(lambda m: self._tok(\"TEL\", m.group()), text)\n        return text\n\n    def unmask(self, text: str) -> str:\n        for token, real in self._to_real.items():\n            text = text.replace(token, real)\n        return text\n\n\ndef main() -> None:\n    provider = make_provider()\n    vault = Vault()\n\n    masque = vault.mask(DEMANDE, noms=(DOSSIER[\"nom\"],))\n    print(\"1) Ce que le LLM reçoit RÉELLEMENT (données masquées) :\\n\")\n    print(\"   \" + masque.replace(\"\\n\", \"\\n   \"), \"\\n\")\n\n    # Garde-fou : AUCUNE vraie PII ne doit être dans le payload sortant.\n    fuites = [v for v in DOSSIER.values() if v in masque]\n    assert not fuites, f\"FUITE de PII vers le LLM : {fuites}\"\n    print(f\"2) Vérification : 0 donnée réelle dans le payload (jetons: \"\n          f\"{list(vault._to_real)}).\\n\")\n\n    response = provider.complete(LLMRequest(\n        messages=[\n            Message(role=\"system\", content=\"Tu rédiges des SMS pros. Garde les [JETONS] intacts.\"),\n            Message(role=\"user\", content=masque),\n        ],\n        temperature=0,\n        max_tokens=300,\n    ))\n    print(\"3) Sortie du LLM (encore masquée) :\\n\")\n    print(\"   \" + response.content.strip().replace(\"\\n\", \"\\n   \"), \"\\n\")\n\n    final = vault.unmask(response.content)\n    print(\"4) Après dé-tokenisation CÔTÉ HOST (vraies valeurs restaurées) :\\n\")\n    print(\"   \" + final.strip().replace(\"\\n\", \"\\n   \"))\n\n\nif __name__ == \"__main__\":\n    main()\n"},
  {id: "13", file: "13_prise_rdv_supervisee.py", label: "13 · Prise de RDV supervisée (code seul)", note: "La démo complète des 3 cerveaux (Orchestrator + superviseur + mémoire par appelant) — le preset ★ en est l'approximation par blocs.", code: "\"\"\"13 — Prise de RDV supervisée : les 3 cerveaux de cati_service, sans la voix.\n\nLe cas le plus riche : un répondeur de prise de rendez-vous. On enlève la couche\nvocale (Gemini Live / Asterisk, qui n'est PAS de l'autoagent) et il reste\nl'architecture à TROIS cerveaux séparés, chacun une brique de la lib :\n\n  1. FLUX DÉTERMINISTE  (Orchestrator)  — le moteur possède la machine à états ;\n     le LLM ne fait qu'interpréter/reformuler. Validation Python par slot :\n     un jour hors planning ou une heure hors fenêtre sont REFUSÉS par le code.\n  2. SUPERVISEUR        (Agent + tools) — un agent autoagent qui a la VUE GLOBALE\n     (état + transcript + mémoire) et TRANCHE via UN outil : valider() ou\n     demander_correction(). post_turn_hook = on le force à trancher.\n  3. MÉMOIRE PAR APPELANT (Memory Protocol) — le numéro = l'identité. Chaque\n     appel est résumé et rangé sur disque ; au rappel, l'agent RETROUVE le passé\n     (register_recall_tool → outil rappeler_memoire).\n\nExécutable tel quel (client simulé) :\n    python examples_autoagent/13_prise_rdv_supervisee.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport re\nimport time\nfrom pathlib import Path\n\nfrom _common import make_provider\n\nfrom autoagent import (Agent, AgentTurnContext, Message, Orchestrator, Step,\n                       TraceEmitter)\n\n# ── Config du RDV (comme config_rdv.json de cati_service) ────────────────────\nJOURS = [\"mardi\", \"mercredi\", \"jeudi\", \"vendredi\", \"samedi\"]\nFENETRES = {\"semaine\": (17, 21), \"samedi\": (10, 15)}   # heures d'ouverture\nDUREE_MIN = 35\nCHAMPS = [\n    (\"nom\",     \"le nom et prénom de la personne\"),\n    (\"jour\",    \"le jour du rendez-vous (du mardi au samedi)\"),\n    (\"heure\",   \"l'heure du rendez-vous\"),\n    (\"tel\",     \"le numéro de rappel (format français)\"),\n    (\"confirm\", \"la confirmation du récapitulatif (oui / non)\"),\n]\nMEM_DIR = Path(__file__).resolve().parent / \"memoire_demo\"\nMEM_DIR.mkdir(exist_ok=True)\nTRACE = Path(__file__).resolve().parent / \"trace_rdv.jsonl\"\n\n\n# ── CERVEAU 3 : mémoire par appelant (Memory Protocol : compact + recall) ────\nclass CallerMemory:\n    \"\"\"Mémoire d'UN numéro. Branchée sur l'agent superviseur (`memory=` +\n    register_recall_tool) : il fouille lui-même les appels passés.\"\"\"\n\n    def __init__(self, numero: str) -> None:\n        self.numero = re.sub(r\"\\D\", \"\", numero) or \"inconnu\"\n\n    def _file(self) -> Path:\n        return MEM_DIR / f\"{self.numero}.json\"\n\n    def compact(self, messages: list[Message]) -> list[Message]:\n        return messages                                   # runs courts → inchangé\n\n    def recall(self, query: str, k: int = 3) -> list[Message]:\n        try:\n            appels = json.loads(self._file().read_text(encoding=\"utf-8\"))[\"appels\"]\n        except Exception:\n            return []\n        mots = [m for m in re.split(r\"\\W+\", (query or \"\").lower()) if len(m) > 2]\n        scored = []\n        for ap in appels:\n            texte = f\"[appel du {ap['date']}] {ap['resume']} — RDV={json.dumps(ap['reponses'], ensure_ascii=False)}\"\n            score = sum(texte.lower().count(m) for m in mots) if mots else 1\n            if score:\n                scored.append((score, texte))\n        scored.sort(key=lambda s: -s[0])\n        return [Message(role=\"user\", content=t) for _, t in scored[:k]]\n\n    def save(self, resume: str, reponses: dict) -> None:\n        data = {\"appels\": []}\n        if self._file().is_file():\n            data = json.loads(self._file().read_text(encoding=\"utf-8\"))\n        data[\"appels\"].append({\"date\": time.strftime(\"%Y-%m-%d %H:%M\"),\n                               \"resume\": resume, \"reponses\": reponses})\n        data[\"appels\"] = data[\"appels\"][-10:]\n        self._file().write_text(json.dumps(data, ensure_ascii=False, indent=1), encoding=\"utf-8\")\n\n\n# ── CERVEAU 1 : validation déterministe des slots (comme flow.py) ────────────\ndef _fenetre(jour: str) -> tuple[int, int, str]:\n    if \"samedi\" in jour.lower():\n        return (*FENETRES[\"samedi\"], \"le samedi\")\n    return (*FENETRES[\"semaine\"], \"en semaine\")\n\ndef valider_slot(champ: str, valeur, etat: dict) -> str | None:\n    \"\"\"Renvoie un message d'erreur (→ rejet, reformulé) ou None (→ accepté).\"\"\"\n    v = str(valeur).lower().strip()\n    if champ == \"jour\":\n        if not any(j in v for j in JOURS):\n            return f\"les enquêteurs ne rappellent que : {', '.join(JOURS)}\"\n    elif champ == \"heure\":\n        m = re.search(r\"(\\d{1,2})\\s*[h:]\\s*(\\d{0,2})\", v)\n        if not m:\n            return \"je n'ai pas compris l'heure (ex. 18h, 14h30)\"\n        h = int(m.group(1))\n        lo, hi, libelle = _fenetre(etat.get(\"jour\", \"\"))\n        if not (lo <= h < hi or (h == hi)):\n            return (f\"{libelle} c'est entre {lo}h et {hi}h (l'entretien dure ~{DUREE_MIN} min) — \"\n                    \"proposez un autre créneau\")\n    elif champ == \"tel\":\n        if not re.match(r\"^(0|\\+?33)\\d{9}$\", re.sub(r\"[ .\\-]\", \"\", v)):\n            return \"il me faut un numéro français valide (ex. 06 12 34 56 78)\"\n    return None\n\n\n# ── Le flux (Orchestrator) piloté par un client SIMULÉ ───────────────────────\ndef prise_de_rdv(provider, scenario: list[str]) -> tuple[dict, str]:\n    answers: dict[str, object] = {}\n    transcript: list[str] = []\n\n    def current_steps():\n        restants = [(c, lbl) for c, lbl in CHAMPS if c not in answers]\n        return [Step(id=c, payload={\"demande\": lbl}) for c, lbl in restants[:2]]\n\n    def record(step_id: str, value) -> str | None:\n        err = valider_slot(step_id, value, answers)\n        if err:\n            return err                                    # rejet : l'étape reste\n        answers[step_id] = int(re.search(r\"\\d{1,2}\", str(value)).group()) if step_id == \"heure\" \\\n            else value\n        return None\n\n    orch = Orchestrator(provider, current_steps=current_steps, record=record,\n                        describe=lambda sid, val: f\"{sid} = {val}\",\n                        closing_text=\"Parfait, votre rendez-vous est confirmé. Merci et à bientôt !\")\n\n    print(\"Léa : Bonjour, service rendez-vous de l'institut Alyce, je suis Léa !\")\n    for reponse in scenario:\n        if not current_steps():\n            break\n        print(f\"\\nClient : {reponse}\")\n        transcript.append(f\"CLIENT : {reponse}\")\n        rep_lea = \"\"\n        for ev in orch.turn(reponse):\n            if ev.type == \"text\":\n                rep_lea += ev.text\n        print(f\"Léa : {rep_lea.strip()}\")\n        transcript.append(f\"LÉA : {rep_lea.strip()}\")\n    return answers, \"\\n\".join(transcript)\n\n\n# ── CERVEAU 2 : le superviseur (Agent autoagent qui TRANCHE) ─────────────────\n_SYS_SUP = (\n    \"Tu es l'ORCHESTRATEUR silencieux d'un répondeur de prise de RDV (l'agent \"\n    \"vocal s'appelle Léa). Tu as la vue globale : état du questionnaire, \"\n    \"transcript, et la mémoire des appels passés de ce numéro (outil \"\n    \"rappeler_memoire — utilise-le si le passé éclaire le présent). Vérifie que \"\n    \"le dernier échange est cohérent, puis TRANCHE en appelant EXACTEMENT UN \"\n    \"outil : valider() si tout va bien (cas NORMAL, sois conservateur) ; \"\n    \"demander_correction(probleme, consigne) s'il y a un VRAI problème (mauvaise \"\n    \"valeur notée, réponse ambiguë validée à tort, info déjà donnée lors d'un \"\n    \"appel passé). Dans le doute → valider().\"\n)\n\ndef superviser(provider, trace, numero: str, etat: str, transcript: str) -> dict:\n    verdict: dict = {\"decide\": False}\n\n    def force_verdict(ctx: AgentTurnContext) -> Message | None:\n        if not verdict[\"decide\"]:\n            return Message(role=\"user\", content=\"Tu n'as pas tranché : appelle valider() \"\n                           \"ou demander_correction(probleme, consigne) MAINTENANT.\")\n        return None\n\n    agent = Agent(provider, system_prompt=_SYS_SUP, max_steps=4, temperature=0.0,\n                  memory=CallerMemory(numero), trace=trace,\n                  post_turn_hook=force_verdict, max_corrections_per_run=1)\n    agent.register_recall_tool(\n        name=\"rappeler_memoire\", default_k=3,\n        description=\"Fouille les appels PASSÉS de ce numéro (résumés + RDV pris).\")\n\n    @agent.tool\n    def valider(raison: str = \"\") -> dict:\n        \"\"\"Le dernier échange est correct : l'appel continue normalement.\"\"\"\n        verdict.update(decide=True, ok=True, raison=raison)\n        return {\"enregistre\": True}\n\n    @agent.tool\n    def demander_correction(probleme: str, consigne: str) -> dict:\n        \"\"\"Signale un vrai problème + une consigne corrective courte pour Léa.\"\"\"\n        verdict.update(decide=True, ok=False, probleme=probleme, consigne=consigne)\n        return {\"enregistre\": True}\n\n    agent.run(f\"ÉTAT DU QUESTIONNAIRE :\\n{etat}\\n\\nTRANSCRIPT :\\n{transcript}\\n\\nTranche.\")\n    return verdict\n\n\ndef main() -> None:\n    provider = make_provider()\n    trace = TraceEmitter(file=str(TRACE))\n    numero = \"0612345678\"\n\n    print(\"═\" * 70 + \"\\nCERVEAU 1 — FLUX DÉTERMINISTE (Orchestrator + validation Python)\\n\" + \"═\" * 70)\n    scenario = [\n        \"Bonjour, Marie Dupont à l'appareil.\",\n        \"Est-ce que lundi serait possible ?\",     # ← REFUSÉ par le moteur (hors planning)\n        \"d'accord, alors jeudi\",                   # ← accepté\n        \"vers 18h ce serait parfait\",              # ← accepté (fenêtre semaine 17-21h)\n        \"vous me rappelez au 06 12 34 56 78\",      # ← accepté\n        \"oui, c'est parfait pour moi\",             # ← confirmation\n    ]\n    answers, transcript = prise_de_rdv(provider, scenario)\n    etat = \"\\n\".join(f\"  {c} = {answers.get(c, '—')}\" for c, _ in CHAMPS)\n    print(f\"\\n→ RDV capturé par le MOTEUR (pas par le LLM) : {answers}\")\n\n    print(\"\\n\" + \"═\" * 70 + \"\\nCERVEAU 2 — SUPERVISEUR (Agent qui tranche : valider / corriger)\\n\" + \"═\" * 70)\n    print(\"\\n• Sur le transcript RÉEL (propre) :\")\n    v1 = superviser(provider, trace, numero, etat, transcript)\n    print(f\"  → verdict : {'✅ VALIDÉ' if v1.get('ok') else '⚠️ CORRECTION'} \"\n          f\"— {v1.get('raison') or v1.get('consigne', '')}\")\n\n    print(\"\\n• Sur un transcript DOUTEUX (Léa a noté 18h mais le client a dit 18h30) :\")\n    faux = transcript.replace(\"vers 18h ce serait parfait\",\n                              \"plutôt 18h30 si possible\") + \"\\nLÉA : C'est noté, jeudi à 18h.\"\n    v2 = superviser(provider, trace, numero, etat + \"\\n  (heure notée : 18h)\", faux)\n    print(f\"  → verdict : {'✅ VALIDÉ' if v2.get('ok') else '⚠️ CORRECTION'} \"\n          f\"— {v2.get('probleme','')} / consigne : {v2.get('consigne','')}\")\n\n    print(\"\\n\" + \"═\" * 70 + \"\\nCERVEAU 3 — MÉMOIRE PAR APPELANT (le numéro rappelle)\\n\" + \"═\" * 70)\n    mem = CallerMemory(numero)\n    mem.save(resume=f\"Marie Dupont a pris RDV le {answers.get('jour')} à {answers.get('heure')}h, \"\n             f\"rappel au {answers.get('tel')}.\", reponses=answers)\n    print(f\"\\n• Appel mémorisé pour le {numero}.\")\n    print(\"• Le MÊME numéro rappelle → l'agent retrouve le passé (recall) :\")\n    for m in mem.recall(\"rendez-vous jour heure\"):\n        print(f\"    ↳ {m.content}\")\n\n    print(f\"\\n[trace complète de l'essaim : {TRACE.name}]\")\n\n\nif __name__ == \"__main__\":\n    main()\n"},
  {id: "14", file: "14_base_sql.py", label: "14 · Base SQL comme source (code seul)", note: "L'agent inspecte le schéma et écrit des SELECT ; l'écriture est refusée PAR LE CODE.", code: "\"\"\"14 — Base SQL comme source : l'agent répond en INTERROGEANT une base.\n\nLa base de données est la SOURCE DE VÉRITÉ — l'agent ne devine rien. Il\ninspecte le schéma (outil `schema`), écrit une requête, la lib l'exécute\n(outil `requete_sql`, en LECTURE SEULE : toute écriture est refusée PAR LE\nCODE, pas par le prompt), puis il répond à partir des lignes réelles.\n\nZéro dépendance : SQLite (stdlib), base en mémoire seedée au démarrage.\n\n    python examples_autoagent/14_base_sql.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sqlite3\n\nfrom _common import make_provider\n\nfrom autoagent import Agent\n\n\ndef _base() -> sqlite3.Connection:\n    \"\"\"Une petite base « comptage routier » en mémoire (la source).\"\"\"\n    conn = sqlite3.connect(\":memory:\")\n    conn.executescript(\"\"\"\n        CREATE TABLE capteurs  (id INTEGER PRIMARY KEY, ville TEXT, statut TEXT);\n        CREATE TABLE comptages (capteur_id INTEGER, jour TEXT, vehicules INTEGER);\n        INSERT INTO capteurs VALUES\n          (1,'Lyon','actif'), (2,'Lyon','panne'), (3,'Valence','actif'),\n          (4,'Grenoble','actif'), (5,'Grenoble','panne');\n        INSERT INTO comptages VALUES\n          (1,'2026-07-01',1240), (1,'2026-07-02',1310),\n          (3,'2026-07-01', 860), (3,'2026-07-02', 910),\n          (4,'2026-07-01',2100), (4,'2026-07-02',1980);\n    \"\"\")\n    return conn\n\n\ndef main() -> None:\n    conn = _base()\n    agent = Agent(make_provider(), max_steps=6,\n                  system_prompt=(\"Tu réponds UNIQUEMENT à partir de la base SQL. \"\n                                 \"Commence par regarder le schéma, puis écris une \"\n                                 \"requête SELECT. Ne fabrique jamais de chiffres.\"))\n\n    @agent.tool\n    def schema() -> dict:\n        \"\"\"Liste les tables et leurs colonnes (à consulter avant d'écrire une requête).\"\"\"\n        out = {}\n        for (table,) in conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\"):\n            out[table] = [f\"{c[1]} {c[2]}\" for c in conn.execute(f\"PRAGMA table_info({table})\")]\n        return {\"tables\": out}\n\n    @agent.tool\n    def requete_sql(sql: str) -> dict:\n        \"\"\"Exécute une requête SQL en LECTURE SEULE et renvoie les lignes.\n        Seul un unique SELECT est autorisé — tout le reste est refusé.\"\"\"\n        clean = sql.strip().rstrip(\";\").strip()\n        if \";\" in clean:\n            return {\"erreur\": \"une seule requête à la fois (pas de ';' multiples)\"}\n        if not clean.lower().startswith((\"select\", \"with\")):\n            return {\"erreur\": \"lecture seule : seules les requêtes SELECT sont autorisées\"}\n        try:\n            cur = conn.execute(clean)\n            cols = [d[0] for d in cur.description]\n            rows = [dict(zip(cols, r)) for r in cur.fetchmany(50)]\n            return {\"colonnes\": cols, \"lignes\": rows, \"n\": len(rows)}\n        except Exception as exc:  # noqa: BLE001 — l'agent voit l'erreur et corrige sa requête\n            return {\"erreur\": f\"{type(exc).__name__}: {exc}\"}\n\n    question = (\"Quelle ville totalise le plus de véhicules comptés, et combien de \"\n                \"capteurs sont en panne au total ?\")\n    print(f\"Question : {question}\\n\")\n    result = agent.run(question)\n    print(result.output)\n\n    # Preuve que l'écriture est bloquée PAR LE CODE (pas par la bonne volonté du LLM) :\n    essai = requete_sql(\"DELETE FROM capteurs\")\n    print(f\"\\n[garde-fou] requete_sql('DELETE …') → {essai}\")\n    if result.usage:\n        print(f\"[{result.steps} tours | {result.usage.total_tokens} tokens | source : SQLite en mémoire]\")\n\n\nif __name__ == \"__main__\":\n    main()\n"},
  {id: "15", file: "15_appel_entrant_fiche.py", label: "15 · Appel entrant → fiche (code seul)", note: "Cascade de repli pilotée par l'agent : fiche locale → CRM → création par conversation.", code: "\"\"\"15 — Appel entrant : identifier l'appelant, ou créer sa fiche.\n\nUn standard téléphonique reçoit un appel avec un NUMÉRO. L'agent applique une\nCASCADE de repli, en choisissant lui-même le bon outil à chaque étape :\n\n    1. fiche_locale(numero)        — connu en base locale ? → on salue.\n    2. sinon annuaire_externe(...)  — connu dans l'AUTRE système (CRM) ?\n    3. sinon on DISCUTE : demander_a_la_personne(...) pour obtenir nom + adresse,\n       puis creer_fiche(...) — la fiche existe désormais en local.\n\nC'est l'agent qui décide de l'escalade (pas un `if` en dur) : on lui donne les\noutils + la procédure, il enchaîne. Ici le CRM et la personne sont simulés pour\nque la démo tourne seule ; en prod on branche un vrai CRM / la voix.\n\n    python examples_autoagent/15_appel_entrant_fiche.py\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom _common import make_provider\n\nfrom autoagent import Agent\n\n# ── Les \"sources\" (simulées) ────────────────────────────────────────────────\nFICHES_LOCALES: dict[str, dict] = {\n    \"0611111111\": {\"nom\": \"Marie Dupont\", \"adresse\": \"12 rue de la Paix, Lyon\"},\n}\nCRM_EXTERNE: dict[str, dict] = {                       # l'AUTRE système\n    \"0622222222\": {\"nom\": \"Paul Martin\", \"adresse\": \"5 av. Jean Jaurès, Grenoble\"},\n}\nPERSONNES: dict[str, dict] = {                         # ce que dira l'appelant inconnu\n    \"0633333333\": {\"nom\": \"Sophie Bernard\", \"adresse\": \"8 place Bellecour, Lyon\"},\n}\n\n\ndef traiter_appel(provider, numero: str) -> str:\n    etat = {\"num\": numero}                             # l'appelant courant (pour la voix simulée)\n\n    agent = Agent(provider, max_steps=10, temperature=0.0, system_prompt=(\n        \"Tu es le standard téléphonique. Un appel arrive avec un numéro. \"\n        \"Procédure STRICTE, dans l'ordre, en t'arrêtant dès que tu as la fiche :\\n\"\n        \"1) fiche_locale(numero) ;\\n\"\n        \"2) si absente → annuaire_externe(numero) ;\\n\"\n        \"3) si toujours absente → demande à la personne son NOM puis son ADRESSE \"\n        \"(demander_a_la_personne), puis creer_fiche(numero, nom, adresse).\\n\"\n        \"Termine par une phrase d'accueil personnalisée, en disant d'où vient la \"\n        \"fiche (base locale, CRM, ou fiche créée à l'instant).\"))\n\n    @agent.tool\n    def fiche_locale(numero: str) -> dict:\n        \"\"\"Cherche l'appelant dans la base LOCALE.\"\"\"\n        f = FICHES_LOCALES.get(numero)\n        print(f\"   [local]    {numero} → {'trouvé' if f else 'inconnu'}\")\n        return {\"trouve\": bool(f), \"fiche\": f}\n\n    @agent.tool\n    def annuaire_externe(numero: str) -> dict:\n        \"\"\"Cherche l'appelant dans l'AUTRE système (CRM externe).\"\"\"\n        f = CRM_EXTERNE.get(numero)\n        print(f\"   [CRM]      {numero} → {'trouvé' if f else 'inconnu'}\")\n        return {\"trouve\": bool(f), \"fiche\": f}\n\n    @agent.tool\n    def demander_a_la_personne(question: str) -> dict:\n        \"\"\"Pose une question à l'appelant et renvoie sa réponse (voix simulée).\"\"\"\n        profil = PERSONNES.get(etat[\"num\"], {})\n        q = question.lower()\n        if any(w in q for w in (\"nom\", \"prénom\", \"appelez\", \"identité\", \"qui\")):\n            rep = profil.get(\"nom\", \"je préfère ne pas dire\")\n        elif any(w in q for w in (\"adresse\", \"habitez\", \"domicile\", \"rue\", \"ville\", \"où\")):\n            rep = profil.get(\"adresse\", \"je ne souhaite pas la donner\")\n        else:\n            rep = \"Pouvez-vous reformuler ?\"\n        print(f\"   [personne] « {question} » → « {rep} »\")\n        return {\"reponse\": rep}\n\n    @agent.tool\n    def creer_fiche(numero: str, nom: str, adresse: str) -> dict:\n        \"\"\"Crée la fiche de l'appelant dans la base LOCALE.\"\"\"\n        FICHES_LOCALES[numero] = {\"nom\": nom, \"adresse\": adresse}\n        print(f\"   [fiche]    créée pour {numero} : {nom} — {adresse}\")\n        return {\"cree\": True, \"fiche\": FICHES_LOCALES[numero]}\n\n    return agent.run(f\"Appel entrant du numéro {numero}. Identifie l'appelant.\").output\n\n\ndef main() -> None:\n    provider = make_provider()\n    for numero, titre in [\n        (\"0611111111\", \"A — numéro CONNU en local\"),\n        (\"0622222222\", \"B — inconnu en local, TROUVÉ dans le CRM externe\"),\n        (\"0633333333\", \"C — inconnu partout → on crée la fiche en discutant\"),\n    ]:\n        print(f\"\\n{'═'*70}\\nAPPEL {titre}\\n{'═'*70}\")\n        print(traiter_appel(provider, numero))\n\n    print(f\"\\n[base locale après les appels : {list(FICHES_LOCALES)}]  \"\n          f\"← le 0633333333 y est maintenant\")\n\n\nif __name__ == \"__main__\":\n    main()\n"}
];

function loadShowcase(id){
  const s = SHOWCASES.find(x=>x.id===id);
  if(!s) return;
  stack = []; renderPalette();
  $("#stack").innerHTML =
    `<div class="drop-empty"><strong>${escapeHtml(s.label)}</strong>` +
    `${escapeHtml(s.note)}<br><br>Démo complète écrite main — non assemblable en blocs. ` +
    `Le code s'affiche à droite (Copier / Télécharger). ` +
    `À lancer depuis <code>examples_autoagent/</code> (dépend de <code>_common.py</code>). ` +
    `Ajouter un bloc repasse en mode constructeur.</div>`;
  $("#code").innerHTML = highlight(s.code);
  window.__lastCode = s.code; window.__lastName = s.file;
  $("#loc-count").textContent = `${s.code.split("\n").length} lignes — ${s.file}`;
  $("#run-cmd").innerHTML = `<span class="k">GEMINI_API_KEY</span>=…&nbsp;&nbsp;python&nbsp;examples_autoagent/${s.file}`;
}

    mk("checkpoint",{}),
    mk("run",{prompt:"Réalise les étapes preparation, collecte, analyse puis rapport, une par une, et conclus en une phrase."}),
  ]},
];

function loadPreset(id){
  const p = PRESETS.find(x=>x.id===id);
  if(!p) return;
  uid = 1; stack = p.make(); render();
}

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

// menu des exemples : panneau scrollable (garantit que les 12 sont accessibles)
(function(){
  const btn = $("#preset-btn"), menu = $("#preset-menu");
  const close = ()=>{ menu.classList.remove("open"); btn.setAttribute("aria-expanded","false"); };
  for(const p of PRESETS){
    const b=document.createElement("button"); b.type="button"; b.className="menu-item";
    b.textContent=p.label; b.setAttribute("role","menuitem");
    b.addEventListener("click", ()=>{ loadPreset(p.id); close(); });
    menu.appendChild(b);
  }
  // Vitrines : démos complètes (code seul, non assemblables en blocs)
  if(SHOWCASES.length){
    const sep=document.createElement("div");
    sep.style.cssText="padding:7px 10px 3px;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;border-top:1px solid var(--line-soft);margin-top:5px";
    sep.textContent="Démos complètes (code seul)";
    menu.appendChild(sep);
    for(const s of SHOWCASES){
      const b=document.createElement("button"); b.type="button"; b.className="menu-item";
      b.textContent=s.label; b.setAttribute("role","menuitem");
      b.addEventListener("click", ()=>{ loadShowcase(s.id); close(); });
      menu.appendChild(b);
    }
  }
  btn.addEventListener("click", e=>{
    e.stopPropagation();
    const open = menu.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click", e=>{ if(!menu.contains(e.target) && e.target!==btn) close(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") close(); });
})();
$("#clear").addEventListener("click", ()=>{ stack=[]; render(); });
$("#copy").addEventListener("click", async ()=>{
  try{ await navigator.clipboard.writeText(window.__lastCode||""); toast("Code copié ✓"); }
  catch{ toast("Copie impossible — sélectionne le texte"); }
});
$("#download").addEventListener("click", ()=>{
  const blob=new Blob([window.__lastCode||""],{type:"text/x-python"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  const fname = window.__lastName || "mon_agent.py";
  a.href=url; a.download=fname; a.click(); URL.revokeObjectURL(url);
  toast(`${fname} téléchargé ✓`);
});

function setTheme(mode){
  document.documentElement.setAttribute("data-theme", mode);
  $("#th-light").setAttribute("aria-pressed", mode==="light");
  $("#th-dark").setAttribute("aria-pressed", mode==="dark");
}
$("#th-light").addEventListener("click", ()=>setTheme("light"));
$("#th-dark").addEventListener("click", ()=>setTheme("dark"));
// thème initial = préférence OS
setTheme(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");

// démarrage : le 1er exemple, pour montrer un résultat concret tout de suite
loadPreset("01");
</script>
